<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motion Graphics — Lori Tsou</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --pink: #e84b74; --dark: #2c2825; --bg: #faf7f4; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--dark);
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 4rem;
      z-index: 100;
      mix-blend-mode: multiply;
    }

    .back-link {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 0.8rem; }

    .site-name {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }
    .site-name.hidden { opacity: 0; }

    /* ── Hero ── */
    .hero {
      padding: 6rem 4rem 1rem;
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .hero h1 span { color: var(--pink); }

    .hero-desc {
      font-size: 1rem;
      line-height: 1.7;
      white-space: nowrap;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }
    @media (max-width: 900px) {
      .hero-desc { white-space: normal; max-width: 480px; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Featured Video ── */
    .featured-section {
      position: sticky;
      top: 0;
      z-index: 0;
      padding: 1rem 4rem 2rem;
    }

    .featured-video {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .featured-video.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .featured-video .video-wrapper {
      width: 82%;
      aspect-ratio: 16/9;
      background: rgba(44,40,37,0.06);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .featured-video .video-wrapper video,
    .featured-video .video-wrapper iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
    }

    .featured-video .video-wrapper .placeholder-text {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.25;
    }

    /* ── Small Videos Grid ── */
    .small-videos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 2rem 4rem 6rem;
      position: relative;
      z-index: 1;
      background: var(--bg);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -8px 40px rgba(44,40,37,0.08);
      min-height: 100vh;
    }

    .small-video-item {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .small-video-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .small-video-item .video-wrapper {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .small-video-item .video-wrapper video,
    .small-video-item .video-wrapper iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
    }

    .small-video-item .video-wrapper .placeholder-text {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.25;
    }


    /* ── Scroll Hint ── */
    .hint {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      color: rgba(44,40,37,0.55);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      pointer-events: none;
    }

    .hint-text {
      writing-mode: vertical-rl;
      animation: fadeSlideIn 1s ease forwards, bounce 1s ease-in-out infinite 1s;
    }

    .hint-line {
      width: 1px;
      height: 56px;
      background: rgba(44,40,37,0.35);
      animation: growLine 1s ease forwards, bounce 1s ease-in-out infinite 1s;
      transform-origin: top;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes growLine {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40%       { transform: translateY(10px); }
      60%       { transform: translateY(6px); }
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .site-name { display: none; }
      .hero { padding: 5rem 1.5rem 2rem; }
      .featured-video { padding: 1.5rem 0; }
      .featured-video .video-wrapper { width: 100%; }
      .small-videos {
        grid-template-columns: repeat(2, 1fr);
        padding: 1.5rem 1.5rem 4rem;
      }
      .hint { display: none; }
    }

    @media (max-width: 480px) {
      .small-videos { grid-template-columns: 1fr; }
    }

/* ── Hamburger ── */
.hamburger {
  display: none;
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 301;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--dark);
  transition: all 0.3s ease;
}
.hamburger.open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.hamburger.open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}
.menu-overlay {
  position: fixed;
  inset: 0;
  background: #faf7f4;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.menu-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.menu-links {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2rem;
}
.menu-links a {
  font-size: clamp(1.4rem, 6vw, 2rem);
  font-weight: 700;
  text-decoration: none;
  color: var(--dark);
  letter-spacing: -0.02em;
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  transition: color 0.2s;
}
.menu-links a:hover { color: var(--pink); }
.menu-links a span {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  font-weight: 400;
  color: var(--pink);
}
@media (max-width: 768px) {
  .hamburger { display: flex; }
}
  </style>
</head>

    <span></span><span></span><span></span>
  </button>

  <nav>

  </div>

  <div class="hero">

    <h1>Motion<br><span>Graphics.</span></h1>
    <p class="hero-desc">Web graphics and videos — motion design that brings brands to life.</p>
  </div>

  <!-- Featured Video -->
  <div class="featured-section">
  <div class="featured-video" id="featuredVideo">
    <div class="video-wrapper">
      <video src="Rooflink_srs_final15.mp4" controls playsinline></video>
    </div>
  </div>
  </div>

  <!-- Small Videos -->
  <div class="small-videos" id="smallVideos">

    <div class="small-video-item">
      <div class="video-wrapper">
        <img src="RL_hero_V2.gif" alt="RL Hero" style="width:100%;display:block;" />
      </div>
    </div>

    <div class="small-video-item">
      <div class="video-wrapper">
        <img src="Home_Mobile.gif" alt="Home Mobile" style="width:100%;display:block;" />
      </div>
    </div>

    <div class="small-video-item">
      <div class="video-wrapper">
        <div id="lottie-map" style="width:75%;margin-top:-20%;"></div>
      </div>
    </div>

    <div class="small-video-item">
      <div class="video-wrapper">
        <div id="lottie-customer" style="width:75%;margin-top:-20%;"></div>
      </div>
    </div>

  </div>

  <!-- Scroll hint -->
  <div class="hint" id="hint">
    <span class="hint-text">Scroll down</span>
    <div class="hint-line"></div>
  </div>

  <script>
    // Scroll hint + site name fade
    const hint = document.getElementById('hint');
    const siteName = document.querySelector('.site-name');
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const nearBottom = scrolled + window.innerHeight >= document.body.scrollHeight - 40;
      hint.style.opacity = nearBottom ? '0' : '';
      siteName.classList.toggle('hidden', scrolled > 20);

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {

          observer.unobserve(e.target);
        }
      });
