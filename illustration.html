<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illustration — Lori Tsou</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --pink: #e84b74; --dark: #2c2825; --bg: #faf7f4; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--dark);
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 4rem;
      z-index: 100;
      mix-blend-mode: multiply;
    }

    .back-link {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 0.8rem; }

    .site-name {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s ease;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .site-name.hidden { opacity: 0; }
    .site-name { text-decoration: none; color: var(--dark); }

    /* ── Layout ── */
    .page-layout {
      display: grid;
      grid-template-columns: 2fr 3fr;
      min-height: 100vh;
    }

    /* ── Sticky Left ── */
    .sticky-left {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 6rem 3rem 4rem 4rem;
      overflow: hidden;
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .sticky-left h1 {
      font-size: clamp(2.8rem, 4.5vw, 5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .sticky-left h1 span { color: var(--pink); }

    .hero-desc {
      font-size: 1rem;
      max-width: 320px;
      line-height: 1.7;
      margin-top: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollable Right ── */
    .gallery-right {
      padding: 7rem 4rem 6rem 1rem;
      overflow-y: auto;
    }

    .gallery {
      columns: 2;
      column-gap: 1rem;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .gallery-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .gallery-item:hover img { transform: scale(1.06); }

    /* ── Scroll Hint ── */
    .hint {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      color: rgba(44,40,37,0.55);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      pointer-events: none;
    }

    .hint-text {
      writing-mode: vertical-rl;
      animation: fadeSlideIn 1s ease forwards, bounce 1s ease-in-out infinite 1s;
    }

    .hint-line {
      width: 1px;
      height: 56px;
      background: rgba(44,40,37,0.35);
      animation: growLine 1s ease forwards, bounce 1s ease-in-out infinite 1s;
      transform-origin: top;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes growLine {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40%       { transform: translateY(10px); }
      60%       { transform: translateY(6px); }
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20,16,14,0.95);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 4px;
      transform: scale(0.92);
      transition: transform 0.3s ease;
    }

    .lightbox.open img { transform: scale(1); }

    .lightbox-close {
      position: absolute;
      top: 2rem; right: 2.5rem;
      color: #fff;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }
    .lightbox-close:hover { opacity: 1; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }

      .page-layout {
        grid-template-columns: 1fr;
        display: block;
      }

      .sticky-left {
        position: relative;
        height: auto;
        min-height: auto;
        padding: 5rem 1.5rem 2.5rem;
      }

      .sticky-left h1 { font-size: clamp(2.2rem, 10vw, 3.5rem); }

      .hero-desc {
        font-size: 0.9rem;
        max-width: 100%;
        margin-top: 1.2rem;
        opacity: 0.5;
        animation: none;
      }

      .gallery-right { padding: 1.5rem 1.5rem 5rem; }
      .gallery { columns: 2; column-gap: 0.6rem; }
      .gallery-item { margin-bottom: 0.6rem; }
      .hint { display: none; }
    }

    @media (max-width: 400px) {
      .gallery { columns: 1; }
    }

/* ── Hamburger ── */
.hamburger {
  display: flex;
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 301;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--dark);
  transition: all 0.3s ease;
}
.hamburger.open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.hamburger.open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}
.menu-overlay {
  position: fixed;
  inset: 0;
  background: #faf7f4;
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.menu-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.menu-links {
  padding-right: 3.5rem;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2rem;
}
.menu-links a {
  font-size: clamp(1.4rem, 6vw, 2rem);
  font-weight: 700;
  text-decoration: none;
  color: var(--dark);
  letter-spacing: -0.02em;
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  transition: color 0.2s;
}
.menu-links a:hover { color: var(--pink); }
.menu-links a span {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  font-weight: 400;
  color: var(--pink);
}
@media (max-width: 768px) {
  .hamburger { display: flex; }
}
  </style>
</head>
<body>

  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <nav>
    <a class="back-link" href="index.html">← Portfolio</a>
    <a class="site-name" href="index.html">Lori Tsou</a>
  </nav>

  <div class="menu-overlay" id="menuOverlay">
    <nav class="menu-links">
      <a href="swag-design.html"><span>01</span> Swag Design</a>
      <a href="motion-graphics.html"><span>02</span> Motion Graphics</a>
      <a href="packaging-design.html"><span>03</span> Packaging Design</a>
      <a href="event-signage.html"><span>04</span> Event Design</a>
      <a href="web-design.html"><span>05</span> Web Design</a>
      <a href="brand-development.html"><span>06</span> Brand Development</a>
      <a href="illustration.html"><span>07</span> Illustration</a>
    </nav>
  </div>

  <div class="page-layout">

    <div class="sticky-left">
      <span class="hero-label">07</span>
      <h1><span>Illustration.</span></h1>
      <p class="hero-desc">Digital and watercolor — illustrations that tell a story.</p>
    </div>

    <div class="gallery-right">
      <div class="gallery" id="gallery">

        <div class="gallery-item">
          <img src="Halberd_3.jpg" alt="Illustration" />
        </div>

        <div class="gallery-item">
          <img src="Aelen_.png" alt="Illustration" />
        </div>

        <div class="gallery-item">
          <img src="Floral_Tattoo_Rabbit_Flowers4x6.jpg" alt="Floral Tattoo Rabbit Flowers" />
        </div>

        <div class="gallery-item">
          <img src="Living_Room_Day_Time.JPEG" alt="Living Room Day Time" />
        </div>

        <div class="gallery-item">
          <img src="Living_Room_Both.PNG" alt="Living Room Both" />
        </div>

        <div class="gallery-item">
          <img src="Floral_Tattoo_Tree3x6.jpg" alt="Floral Tattoo Tree" />
        </div>

        <div class="gallery-item">
          <img src="watercolor.jpg" alt="Watercolor" />
        </div>

        <div class="gallery-item">
          <img src="Thun.PNG" alt="Thun" />
        </div>


        <div class="gallery-item">
          <img src="Carl_.jpg" alt="Carl" />
        </div>

        <div class="gallery-item">
          <img src="Final.png" alt="Illustration" />
        </div>

      </div>
    </div>

  </div>

  <!-- Scroll hint -->
  <div class="hint" id="hint">
    <span class="hint-text">Scroll down</span>
    <div class="hint-line"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">Close ✕</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script>
    // Scroll hint + site name fade
    const hint = document.getElementById('hint');
    const siteName = document.querySelector('.site-name');
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const nearBottom = scrolled + window.innerHeight >= document.body.scrollHeight - 40;
      hint.style.opacity = nearBottom ? '0' : '';
      siteName.classList.toggle('hidden', scrolled > 20);
    });

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));

    // Lightbox
    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    document.querySelectorAll('.gallery-item:not(.placeholder)').forEach(item => {
      item.addEventListener('click', () => {
        lightboxImg.src = item.querySelector('img').src;
        lightbox.classList.add('open');
      });
    });

    document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const menuOverlay = document.getElementById('menuOverlay');
    hamburger.addEventListener('click', () => {
      const isOpen = menuOverlay.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        menuOverlay.classList.remove('open');
        hamburger.classList.remove('open');
      }
    });
  </script>
</body>
</html>
