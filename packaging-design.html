<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packaging Design — Lori Tsou</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --pink: #e84b74; --dark: #2c2825; --bg: #faf7f4; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--dark);
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 4rem;
      z-index: 100;
      mix-blend-mode: multiply;
    }

    .back-link {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 0.8rem; }

    .site-name {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }
    .site-name.hidden { opacity: 0; }

    /* ── Layout ── */
    .page-layout {
      display: grid;
      grid-template-columns: 2fr 3fr;
      min-height: 100vh;
    }

    /* ── Sticky Left ── */
    .sticky-left {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 6rem 3rem 4rem 4rem;
      overflow: hidden;
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .sticky-left h1 {
      font-size: clamp(2.8rem, 4.5vw, 5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .sticky-left h1 span { color: var(--pink); }

    .hero-desc {
      font-size: 1rem;
      max-width: 320px;
      line-height: 1.7;
      margin-top: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollable Right ── */
    .gallery-right {
      padding: 7rem 4rem 6rem 1rem;
      overflow-y: auto;
    }

    .gallery {
      columns: 2;
      column-gap: 1rem;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .gallery-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .gallery-item:hover img { transform: scale(1.06); }

    /* ── Scroll Hint ── */
    .hint {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      color: rgba(44,40,37,0.55);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      pointer-events: none;
    }

    .hint-text {
      writing-mode: vertical-rl;
      animation: fadeSlideIn 1s ease forwards, bounce 1s ease-in-out infinite 1s;
    }

    .hint-line {
      width: 1px;
      height: 56px;
      background: rgba(44,40,37,0.35);
      animation: growLine 1s ease forwards, bounce 1s ease-in-out infinite 1s;
      transform-origin: top;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes growLine {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40%       { transform: translateY(10px); }
      60%       { transform: translateY(6px); }
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20,16,14,0.95);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 4px;
      transform: scale(0.92);
      transition: transform 0.3s ease;
    }

    .lightbox.open img { transform: scale(1); }

    .lightbox-close {
      position: absolute;
      top: 2rem; right: 2.5rem;
      color: #fff;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }
    .lightbox-close:hover { opacity: 1; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }

      .page-layout {
        grid-template-columns: 1fr;
        display: block;
      }

      .sticky-left {
        position: relative;
        height: auto;
        min-height: auto;
        padding: 5rem 1.5rem 2.5rem;
      }

      .sticky-left h1 { font-size: clamp(2.2rem, 10vw, 3.5rem); }

      .hero-desc {
        font-size: 0.9rem;
        max-width: 100%;
        margin-top: 1.2rem;
        opacity: 0.5;
        animation: none;
      }

      .gallery-right { padding: 1.5rem 1.5rem 5rem; }
      .gallery { columns: 2; column-gap: 0.6rem; }
      .gallery-item { margin-bottom: 0.6rem; }
      .hint { display: none; }
    }

    @media (max-width: 400px) {
      .gallery { columns: 1; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="back-link" href="index.html">← Portfolio</a>
    <span class="site-name">Lori Tsou</span>
  </nav>

  <div class="page-layout">

    <div class="sticky-left">
      <span class="hero-label">03</span>
      <h1>Packaging<br><span>Design.</span></h1>
      <p class="hero-desc">Bottles, boxes, and more — packaging crafted to stand out on the shelf.</p>
    </div>

    <div class="gallery-right">
      <div class="gallery" id="gallery">

        <div class="gallery-item">
          <img src="TranontVitaminCSupplements.jpg" alt="Packaging Design" />
        </div>

        <div class="gallery-item">
          <img src="brizo.jpg" alt="Brizo" />
        </div>

        <div class="gallery-item">
          <img src="mojo.jpg" alt="Mojo" />
        </div>

        <div class="gallery-item">
          <img src="Tranont8562-toothpaste(1).jpg" alt="Tranont Toothpaste" />
        </div>

        <div class="gallery-item">
          <img src="Tranont8570-Rinse(1).jpg" alt="Tranont Rinse" />
        </div>

        <div class="gallery-item">
          <img src="Tranont-8995-Spray(1).jpg" alt="Tranont Spray" />
        </div>

        <div class="gallery-item">
          <img src="Tranont8800-AllProducts (1)(1).jpg" alt="Tranont All Products" />
        </div>

      </div>
    </div>

  </div>

  <!-- Scroll hint -->
  <div class="hint" id="hint">
    <span class="hint-text">Scroll down</span>
    <div class="hint-line"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">Close ✕</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script>
    // Scroll hint + site name fade
    const hint = document.getElementById('hint');
    const siteName = document.querySelector('.site-name');
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const nearBottom = scrolled + window.innerHeight >= document.body.scrollHeight - 40;
      hint.style.opacity = nearBottom ? '0' : '';
      siteName.classList.toggle('hidden', scrolled > 20);
    });

    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));

    // Lightbox
    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    document.querySelectorAll('.gallery-item:not(.placeholder)').forEach(item => {
      item.addEventListener('click', () => {
        lightboxImg.src = item.querySelector('img').src;
        lightbox.classList.add('open');
      });
    });

    document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
  </script>
</body>
</html>
